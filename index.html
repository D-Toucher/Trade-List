<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trader Journal V.2.0</title>
    <style>
        /* THEME DEFINITIONS */
        :root { 
            --bg: #050505; --card: #111111; --accent: #3b82f6; --text: #ffffff; 
            --dim: #888888; --border: rgba(255,255,255,0.1); --success: #00f291; --danger: #ff4d4d; 
        }
        
        [data-theme="black-blue"] { --bg: #020617; --card: #0f172a; --accent: #3b82f6; --text: #f8fafc; --dim: #94a3b8; --border: rgba(59,130,246,0.2); }
        [data-theme="white-blue"] { --bg: #f8fafc; --card: #ffffff; --accent: #2563eb; --text: #0f172a; --dim: #64748b; --border: rgba(0,0,0,0.05); }
        [data-theme="black-dark-green"] { --bg: #000000; --card: #052e16; --accent: #16a34a; --text: #dcfce7; --dim: #166534; --border: #052e16; }
        [data-theme="white-green"] { --bg: #f0fdf4; --card: #ffffff; --accent: #16a34a; --text: #14532d; --dim: #15803d; --border: rgba(22,163,74,0.1); }
        [data-theme="golden-black"] { --bg: #0c0a09; --card: #1c1917; --accent: #d97706; --text: #fafaf9; --dim: #78716c; --border: #44403c; }
        [data-theme="white-black"] { --bg: #ffffff; --card: #f5f5f5; --accent: #000000; --text: #000000; --dim: #737373; --border: #d4d4d4; }

        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            font-weight: 700;
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; 
            padding-top: env(safe-area-inset-top, 15px);
            display: flex; justify-content: center; 
        }

        .app { width: 100%; max-width: 500px; padding-bottom: 160px; }

        /* HEADER AREA */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .title-group { display: flex; align-items: baseline; gap: 5px; flex-shrink: 1; }
        h1 { font-weight: 900; font-size: 1.4rem; margin: 0; letter-spacing: -0.5px; white-space: nowrap; }
        .version { font-size: 0.6rem; color: var(--accent); opacity: 0.8; }
        
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-clear { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; cursor: pointer; }
        .theme-sel { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 7px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; outline: none; max-width: 100px; }

        /* USER NAME BAR */
        .user-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .user-bar span { font-size: 0.7rem; color: var(--dim); white-space: nowrap; }
        .user-bar input { background: transparent; border: none; color: var(--accent); font-weight: 900; width: 100%; outline: none; font-size: 0.9rem; font-family: inherit; }

        /* BOX COMPONENTS */
        .bar { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-col { grid-column: span 2; }
        
        .field { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.6rem; font-weight: 900; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
        
        select, input { 
            background: var(--bg); border: 1px solid var(--border); color: var(--text); 
            padding: 10px; border-radius: 10px; font-size: 0.85rem; font-weight: 800; 
            font-family: inherit; outline: none; width: 100%; -webkit-appearance: none;
        }
        select:focus, input:focus { border-color: var(--accent); }

        /* TAGS (SESSIONS) */
        .tags { display: flex; gap: 5px; margin-top: 5px; }
        .tag { flex: 1; text-align: center; font-size: 0.6rem; padding: 8px 4px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--dim); font-weight: 900; }
        .tag.active { color: var(--accent); border-color: var(--accent); background: rgba(59,130,246,0.1); }

        /* CONVERTER */
        .conv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; margin-top: 8px; }
        .conv-item { background: var(--bg); padding: 10px 5px; border-radius: 12px; border: 1px solid var(--border); }
        .conv-val { font-size: 0.75rem; font-weight: 900; color: var(--accent); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; }

        /* JOURNAL CARDS */
        .day-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 10px; }
        .day-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-left: 4px solid var(--accent); padding-left: 12px; }
        .node-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .node { background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; font-size: 0.75rem; cursor: pointer; font-weight: 900; }
        .win { color: var(--success); border-color: var(--success); background: rgba(0,242,145,0.05); }
        .loss { color: var(--danger); border-color: var(--danger); background: rgba(255,77,77,0.05); }

        /* STICKY FOOTER */
        .footer-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 30px); max-width: 470px; 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(10px);
            padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));
        }

        .bottom-thanks { text-align: center; padding: 20px 0; opacity: 0.6; font-size: 0.7rem; }

        /* RESPONSIVE DESKTOP */
        @media (min-width: 600px) {
            .node-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }
    </style>
</head>
<body data-theme="black-blue">

<div class="app">
    <header>
        <div class="title-group">
            <h1>Trader Journal</h1>
            <span class="version">V.2.0 📈</span>
        </div>
        <div class="header-actions">
            <button class="btn-clear" onclick="resetAll()">Clear</button>
            <select class="theme-sel" onchange="document.body.setAttribute('data-theme', this.value)">
                <option value="black-blue">Dark Blue</option>
                <option value="white-blue">Light Blue</option>
                <option value="black-dark-green">Dark Green</option>
                <option value="white-green">Light Green</option>
                <option value="golden-black">Gold</option>
                <option value="white-black">Mono</option>
            </select>
        </div>
    </header>

    <div class="user-bar">
        <span>TRADER:</span>
        <input type="text" id="user-name" placeholder="Enter name..." onkeyup="saveUser()">
    </div>

    <div class="bar">
        <div class="grid">
            <div class="field full-col">
                <label>Market Selection</label>
                <select id="asset" onchange="loadAsset()">
                    <optgroup label="Commodity">
                        <option value="XAUUSD" selected>XAU/USD (Gold)</option>
                    </optgroup>
                    <optgroup label="Major Pairs">
                        <option value="EURUSD">EUR/USD</option>
                        <option value="GBPUSD">GBP/USD</option>
                        <option value="USDJPY">USD/JPY</option>
                    </optgroup>
                </select>
            </div>
            <div class="field">
                <label>Time Zone</label>
                <select id="tz" onchange="updateClock()">
                    <option value="Asia/Jakarta">WIB</option>
                    <option value="Asia/Makassar">WITA</option>
                    <option value="Asia/Jayapura">WIT</option>
                </select>
            </div>
            <div class="field">
                <label>Start Date</label>
                <input type="date" id="start-date" onchange="sync()">
            </div>
            <div class="full-col">
                <div class="tags">
                    <div id="tag-asia" class="tag">ASIA ⛩️</div>
                    <div id="tag-london" class="tag">LONDON 🏛️</div>
                    <div id="tag-ny" class="tag">NY 🗽</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bar">
        <div class="grid">
            <div class="field">
                <label>Account Type</label>
                <select id="acc-type" onchange="sync()">
                    <option value="standard">Standard</option>
                    <option value="cent">Cent</option>
                </select>
            </div>
            <div class="field">
                <label id="label-cap">Capital</label>
                <input type="number" id="cap" value="1000" onchange="sync()">
            </div>
            <div class="field">
                <label>Layers</label>
                <input type="number" id="layers" value="3" onchange="sync()">
            </div>
            <div class="field">
                <label>RR (1:X)</label>
                <input type="number" id="rr" value="2" onchange="sync()">
            </div>
        </div>
    </div>

    <div class="bar">
        <label>Balance Converter</label>
        <div class="conv-grid">
            <div class="conv-item"><label>IDR</label><div id="c-idr" class="conv-val">0</div></div>
            <div class="conv-item"><label>JPY</label><div id="c-jpy" class="conv-val">0</div></div>
            <div class="conv-item"><label>AUD</label><div id="c-aud" class="conv-val">0</div></div>
        </div>
    </div>

    <div id="journal-render"></div>

    <div class="bottom-thanks">
        <b>Thanks for using Trader Journal 🤖</b><br>
        KEEP KONSISTEN & DISIPLIN 🔥
    </div>

    <div class="footer-nav">
        <div>
            <label>Equity (USD)</label>
            <div id="foot-bal" style="font-weight: 900; font-size: 1.1rem; color: var(--accent);">0.00</div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-family: monospace; font-weight: 900; font-size: 0.9rem;">00:00:00</div>
            <div id="foot-stat" style="font-size: 0.6rem; color: var(--dim); font-weight: 900; margin-top: 2px;">WR: 0%</div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = "TRADER_V2_PRO_";
    const RATES = { IDR: 16250, JPY: 156.2, AUD: 1.51 };

    function updateClock() {
        const tz = document.getElementById('tz').value;
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {timeZone: tz, hour12: false});
        
        const hr = parseInt(now.toLocaleTimeString('en-GB', {timeZone: 'Asia/Jakarta', hour: '2-digit'}));
        document.getElementById('tag-asia').className = (hr >= 6 && hr < 14) ? 'tag active' : 'tag';
        document.getElementById('tag-london').className = (hr >= 14 && hr < 22) ? 'tag active' : 'tag';
        document.getElementById('tag-ny').className = (hr >= 19 || hr < 3) ? 'tag active' : 'tag';
    }

    function saveUser() {
        localStorage.setItem(STORAGE_KEY + "name", document.getElementById('user-name').value);
    }

    function sync() {
        const asset = document.getElementById('asset').value;
        const data = {
            start: document.getElementById('start-date').value,
            type: document.getElementById('acc-type').value,
            cap: document.getElementById('cap').value,
            lay: document.getElementById('layers').value,
            rr: document.getElementById('rr').value
        };
        localStorage.setItem(STORAGE_KEY + asset + "_cfg", JSON.stringify(data));
        render();
    }

    function loadAsset() {
        const asset = document.getElementById('asset').value;
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY + asset + "_cfg"));
        document.getElementById('user-name').value = localStorage.getItem(STORAGE_KEY + "name") || "";
        
        if(saved) {
            document.getElementById('start-date').value = saved.start;
            document.getElementById('acc-type').value = saved.type;
            document.getElementById('cap').value = saved.cap;
            document.getElementById('layers').value = saved.lay;
            document.getElementById('rr').value = saved.rr;
        } else {
            document.getElementById('start-date').value = new Date().toISOString().split('T')[0];
        }
        render();
    }

    function render() {
        const asset = document.getElementById('asset').value;
        const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY + asset + "_cfg")) || {cap: 1000, lay: 3, rr: 2, type: 'standard', start: new Date()};
        const isCent = cfg.type === 'cent';
        document.getElementById('label-cap').innerText = isCent ? "Capital (Cent)" : "Capital (USD)";
        
        const container = document.getElementById('journal-render');
        container.innerHTML = '';
        
        let profit = 0, wCount = 0, lCount = 0;
        const riskLayer = (cfg.cap * 0.01); 
        const tpLayer = riskLayer * cfg.rr;

        for(let d=0; d<30; d++) {
            const date = new Date(cfg.start); date.setDate(date.getDate() + d);
            let dayPnL = 0;
            let nodes = [];

            for(let l=1; l<=cfg.lay; l++) {
                const k = `${STORAGE_KEY}${asset}_D${d}_L${l}`;
                const s = localStorage.getItem(k);
                if(s === 'W') { dayPnL += tpLayer; wCount++; }
                else if(s === 'L') { dayPnL -= riskLayer; lCount++; }
                nodes.push(`<div class="node ${s==='W'?'win':s==='L'?'loss':''}" onclick="mark('${k}')">${s || 'L'+l}</div>`);
            }
            profit += dayPnL;

            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="day-head">
                    <span style="font-size:0.8rem;">DAY ${d+1} <small style="color:var(--dim);">${date.toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</small></span>
                    <span style="font-size:0.8rem;" class="${dayPnL>=0?'win':'loss'}">${dayPnL>=0?'+':''}${dayPnL.toFixed(2)}</span>
                </div>
                <div class="node-grid">${nodes.join('')}</div>
            `;
            container.appendChild(card);
        }

        const totalEquity = parseFloat(cfg.cap) + profit;
        const usdValue = isCent ? totalEquity / 100 : totalEquity;

        document.getElementById('foot-bal').innerText = `${usdValue.toFixed(2)}`;
        document.getElementById('foot-stat').innerText = `WR: ${(wCount+lCount>0?(wCount/(wCount+lCount)*100).toFixed(0):0)}% | PNL: ${profit.toFixed(1)}`;
        
        document.getElementById('c-idr').innerText = (usdValue * RATES.IDR).toLocaleString('id-ID', {maximumFractionDigits:0});
        document.getElementById('c-jpy').innerText = (usdValue * RATES.JPY).toLocaleString('ja-JP', {maximumFractionDigits:0});
        document.getElementById('c-aud').innerText = (usdValue * RATES.AUD).toFixed(1);
    }

    function mark(k) {
        const v = localStorage.getItem(k);
        if(!v) localStorage.setItem(k, 'W');
        else if(v === 'W') localStorage.setItem(k, 'L');
        else localStorage.removeItem(k);
        render();
    }

    function resetAll() {
        if(confirm("Reset data untuk market ini?")) {
            const asset = document.getElementById('asset').value;
            Object.keys(localStorage).forEach(k => { if(k.includes(STORAGE_KEY + asset)) localStorage.removeItem(k); });
            loadAsset();
        }
    }

    window.onload = () => { loadAsset(); setInterval(updateClock, 1000); };
</script>
</body>
</html>
