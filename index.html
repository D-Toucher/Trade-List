<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trader Journal V.2.0</title>
    <style>
        /* THEME DEFINITIONS */
        :root { --bg: #050505; --card: #111111; --accent: #3b82f6; --text: #ffffff; --dim: #888888; --border: rgba(255,255,255,0.1); --success: #00f291; --danger: #ff4d4d; }
        
        [data-theme="black-blue"] { --bg: #020617; --card: #0f172a; --accent: #3b82f6; --text: #f8fafc; --dim: #94a3b8; --border: rgba(59,130,246,0.2); }
        [data-theme="white-blue"] { --bg: #f8fafc; --card: #ffffff; --accent: #2563eb; --text: #0f172a; --dim: #64748b; --border: rgba(0,0,0,0.05); }
        [data-theme="black-dark-green"] { --bg: #000000; --card: #052e16; --accent: #16a34a; --text: #dcfce7; --dim: #166534; --border: #052e16; }
        [data-theme="white-green"] { --bg: #f0fdf4; --card: #ffffff; --accent: #16a34a; --text: #14532d; --dim: #15803d; --border: rgba(22,163,74,0.1); }
        [data-theme="golden-black"] { --bg: #0c0a09; --card: #1c1917; --accent: #d97706; --text: #fafaf9; --dim: #78716c; --border: #44403c; }
        [data-theme="white-black"] { --bg: #ffffff; --card: #f5f5f5; --accent: #000000; --text: #000000; --dim: #737373; --border: #d4d4d4; }

        * { box-sizing: border-box; transition: 0.2s; }
        
        /* Font San Francisco Bold System */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif; 
            font-weight: 700;
            background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; 
        }

        .app { width: 100%; max-width: 550px; padding-bottom: 180px; }

        /* HEADER AREA */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .title-group { display: flex; align-items: baseline; gap: 8px; }
        h1 { font-weight: 900; font-size: 1.7rem; margin: 0; letter-spacing: -1px; }
        .version { font-size: 0.65rem; color: var(--accent); opacity: 0.8; }
        .emoji-v { font-size: 1.5rem; margin-left: 5px; }
        
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .btn-clear { background: var(--danger); color: white; border: none; padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; cursor: pointer; }
        .theme-sel { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 7px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; outline: none; }

        /* USER NAME BAR */
        .user-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .user-bar span { font-size: 0.7rem; color: var(--dim); white-space: nowrap; }
        .user-bar input { background: transparent; border: none; color: var(--accent); font-weight: 900; width: 100%; outline: none; font-size: 0.9rem; font-family: inherit; }

        /* BAR BOXES */
        .bar { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.65rem; font-weight: 900; color: var(--dim); text-transform: uppercase; letter-spacing: 0.6px; }
        select, input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 800; font-family: inherit; outline: none; }
        select:focus, input:focus { border-color: var(--accent); }

        /* MARKET SESSIONS */
        .tags { display: flex; gap: 8px; grid-column: span 2; margin-top: 12px; }
        .tag { flex: 1; text-align: center; font-size: 0.7rem; padding: 10px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--dim); font-weight: 900; }
        .tag.active { color: var(--accent); border-color: var(--accent); background: rgba(59,130,246,0.15); box-shadow: 0 0 15px rgba(59,130,246,0.1); }

        /* CONVERTER */
        .conv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; margin-top: 5px; }
        .conv-item { background: var(--bg); padding: 12px; border-radius: 14px; border: 1px solid var(--border); }
        .conv-val { font-size: 0.8rem; font-weight: 900; color: var(--accent); margin-top: 4px; }

        /* JOURNAL AREA */
        .day-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 12px; }
        .day-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-left: 5px solid var(--accent); padding-left: 15px; }
        .node-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; }
        .node { background: var(--bg); border: 1px solid var(--border); padding: 14px; border-radius: 14px; text-align: center; font-size: 0.8rem; cursor: pointer; font-weight: 900; }
        .win { color: var(--success); border-color: var(--success); background: rgba(0,242,145,0.1); }
        .loss { color: var(--danger); border-color: var(--danger); background: rgba(255,77,77,0.1); }

        /* FOOTER SIGNATURE */
        .bottom-thanks { text-align: center; padding: 40px 20px; margin-top: 20px; }
        .thanks-msg { font-size: 0.9rem; font-weight: 900; color: var(--text); opacity: 0.9; margin-bottom: 6px; }
        .konsisten-msg { font-size: 0.75rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* STICKY FOOTER */
        .footer-nav { position: fixed; bottom: 20px; width: calc(100% - 30px); max-width: 520px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 50px rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(10px); }
    </style>
</head>
<body data-theme="black-blue">

<div class="app">
    <header>
        <div class="title-group">
            <h1>Trader Journal</h1>
            <span class="version">V.2.0</span>
            <span class="emoji-v">📈</span>
        </div>
        <div class="header-actions">
            <button class="btn-clear" onclick="resetAll()">Clear</button>
            <select class="theme-sel" onchange="document.body.setAttribute('data-theme', this.value)">
                <option value="black-blue">Black Blue</option>
                <option value="white-blue">White Blue</option>
                <option value="black-dark-green">Black Green</option>
                <option value="white-green">White Green</option>
                <option value="golden-black">Golden Black</option>
                <option value="white-black">White Black</option>
            </select>
        </div>
    </header>

    <!-- BAR 0: User Name -->
    <div class="user-bar">
        <span>TRADER:</span>
        <input type="text" id="user-name" placeholder="Enter name here..." onkeyup="saveUser()">
    </div>

    <!-- BAR 1: Market Memory & Settings -->
    <div class="bar">
        <div class="grid">
            <div class="field" style="grid-column: span 2;">
                <label>Multi Market Memory</label>
                <select id="asset" onchange="loadAsset()">
                    <optgroup label="Major Pairs">
                        <option value="EURUSD">EUR/USD (Euro / Dollar)</option>
                        <option value="GBPUSD">GBP/USD (Pound / Dollar)</option>
                        <option value="USDJPY">USD/JPY (Dollar / Yen)</option>
                        <option value="USDCHF">USD/CHF (Dollar / Franc)</option>
                        <option value="AUDUSD">AUD/USD (Aussie / Dollar)</option>
                        <option value="USDCAD">USD/CAD (Loonie / Dollar)</option>
                        <option value="NZDUSD">NZD/USD (Kiwi / Dollar)</option>
                    </optgroup>
                    <optgroup label="Minor / Cross Pairs">
                        <option value="EURGBP">EUR/GBP</option>
                        <option value="EURJPY">EUR/JPY</option>
                        <option value="GBPJPY">GBP/JPY</option>
                        <option value="AUDNZD">AUD/NZD</option>
                    </optgroup>
                    <optgroup label="Exotic Pairs">
                        <option value="USDSGD">USD/SGD</option>
                        <option value="USDTRY">USD/TRY</option>
                    </optgroup>
                    <optgroup label="Commodity">
                        <option value="XAUUSD" selected>XAU/USD (Gold) ✨</option>
                        <option value="WTIUSD">WTI/USD (Oil)</option>
                    </optgroup>
                </select>
            </div>
            <div class="field">
                <label>Time Zone</label>
                <select id="tz" onchange="updateClock()">
                    <option value="Asia/Jakarta">WIB (GMT+7)</option>
                    <option value="Asia/Makassar">WITA (GMT+8)</option>
                    <option value="Asia/Jayapura">WIT (GMT+9)</option>
                </select>
            </div>
            <div class="field">
                <label>Start Date</label>
                <input type="date" id="start-date" onchange="sync()">
            </div>
            <div class="tags">
                <div id="tag-asia" class="tag">ASIA ⛩️</div>
                <div id="tag-london" class="tag">LONDON 🏛️</div>
                <div id="tag-ny" class="tag">NEW YORK 🗽</div>
            </div>
        </div>
    </div>

    <!-- BAR 2: Capital & Risk Management -->
    <div class="bar">
        <div class="grid">
            <div class="field">
                <label>Account Type</label>
                <select id="acc-type" onchange="sync()">
                    <option value="standard">Standard Account</option>
                    <option value="cent">Cent Account</option>
                </select>
            </div>
            <div class="field">
                <label id="label-cap">Capital (USD)</label>
                <input type="number" id="cap" value="1000" onchange="sync()">
            </div>
            <div class="field">
                <label>Layers (Jumlah)</label>
                <input type="number" id="layers" value="3" onchange="sync()">
            </div>
            <div class="field">
                <label>RR (1 : X)</label>
                <input type="number" id="rr" value="2" onchange="sync()">
            </div>
        </div>
    </div>

    <!-- BAR 3: Conversion Bar -->
    <div class="bar">
        <label>Balance Converter (USD Base)</label>
        <div class="conv-grid">
            <div class="conv-item">
                <label>IDR 🇮🇩</label>
                <div id="c-idr" class="conv-val">0</div>
            </div>
            <div class="conv-item">
                <label>JPY 🇯🇵</label>
                <div id="c-jpy" class="conv-val">0</div>
            </div>
            <div class="conv-item">
                <label>AUD 🇦🇺</label>
                <div id="c-aud" class="conv-val">0</div>
            </div>
        </div>
    </div>

    <!-- JOURNAL LIST -->
    <div id="journal-render"></div>

    <!-- SIGNATURE BOTTOM -->
    <div class="bottom-thanks">
        <div class="thanks-msg">Thanks for using this website 🤖</div>
        <div class="konsisten-msg">Keep konsisten anti nafsu 🔥</div>
    </div>

    <!-- STICKY FOOTER INFO -->
    <div class="footer-nav">
        <div>
            <label>Real Equity</label>
            <div id="foot-bal" style="font-weight: 900; font-size: 1.2rem; color: var(--accent);">0.00</div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-family: monospace; font-weight: 900; font-size: 1rem; letter-spacing: 1px;">00:00:00</div>
            <div id="foot-stat" style="font-size: 0.65rem; color: var(--dim); font-weight: 900; margin-top: 2px;">WR: 0%</div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = "TRADER_V2_PRO_";
    const RATES = { IDR: 16250, JPY: 156.2, AUD: 1.51 };

    function updateClock() {
        const tz = document.getElementById('tz').value;
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {timeZone: tz, hour12: false});
        
        const hr = parseInt(now.toLocaleTimeString('en-GB', {timeZone: 'Asia/Jakarta', hour: '2-digit'}));
        document.getElementById('tag-asia').className = (hr >= 6 && hr < 14) ? 'tag active' : 'tag';
        document.getElementById('tag-london').className = (hr >= 14 && hr < 22) ? 'tag active' : 'tag';
        document.getElementById('tag-ny').className = (hr >= 19 || hr < 3) ? 'tag active' : 'tag';
    }

    function saveUser() {
        localStorage.setItem(STORAGE_KEY + "name", document.getElementById('user-name').value);
    }

    function sync() {
        const asset = document.getElementById('asset').value;
        const data = {
            start: document.getElementById('start-date').value,
            type: document.getElementById('acc-type').value,
            cap: document.getElementById('cap').value,
            lay: document.getElementById('layers').value,
            rr: document.getElementById('rr').value
        };
        localStorage.setItem(STORAGE_KEY + asset + "_cfg", JSON.stringify(data));
        render();
    }

    function loadAsset() {
        const asset = document.getElementById('asset').value;
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY + asset + "_cfg"));
        document.getElementById('user-name').value = localStorage.getItem(STORAGE_KEY + "name") || "";
        
        if(saved) {
            document.getElementById('start-date').value = saved.start;
            document.getElementById('acc-type').value = saved.type;
            document.getElementById('cap').value = saved.cap;
            document.getElementById('layers').value = saved.lay;
            document.getElementById('rr').value = saved.rr;
        } else {
            document.getElementById('start-date').value = new Date().toISOString().split('T')[0];
        }
        render();
    }

    function render() {
        const asset = document.getElementById('asset').value;
        const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY + asset + "_cfg")) || {cap: 1000, lay: 3, rr: 2, type: 'standard', start: new Date()};
        const isCent = cfg.type === 'cent';
        document.getElementById('label-cap').innerText = isCent ? "Capital (Cent)" : "Capital (USD)";
        
        const container = document.getElementById('journal-render');
        container.innerHTML = '';
        
        let profit = 0, wCount = 0, lCount = 0;
        const riskLayer = (cfg.cap * 0.01); 
        const tpLayer = riskLayer * cfg.rr;

        for(let d=0; d<30; d++) {
            const date = new Date(cfg.start); date.setDate(date.getDate() + d);
            let dayPnL = 0;
            let nodes = [];

            for(let l=1; l<=cfg.lay; l++) {
                const k = `${STORAGE_KEY}${asset}_D${d}_L${l}`;
                const s = localStorage.getItem(k);
                if(s === 'W') { dayPnL += tpLayer; wCount++; }
                else if(s === 'L') { dayPnL -= riskLayer; lCount++; }
                nodes.push(`<div class="node ${s==='W'?'win':s==='L'?'loss':''}" onclick="mark('${k}')">${s || 'L'+l}</div>`);
            }
            profit += dayPnL;

            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="day-head">
                    <span style="font-weight:900; font-size:0.9rem;">DAY ${d+1} <small style="color:var(--dim); margin-left:5px;">${date.toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</small></span>
                    <span style="font-family:monospace; font-size:0.85rem; font-weight:900" class="${dayPnL>=0?'win':'loss'}">${dayPnL>=0?'+':''}${dayPnL.toFixed(2)}</span>
                </div>
                <div class="node-grid">${nodes.join('')}</div>
            `;
            container.appendChild(card);
        }

        const totalEquity = parseFloat(cfg.cap) + profit;
        const usdValue = isCent ? totalEquity / 100 : totalEquity;

        document.getElementById('foot-bal').innerText = `${usdValue.toFixed(2)} USD`;
        document.getElementById('foot-stat').innerText = `WIN RATE: ${(wCount+lCount>0?(wCount/(wCount+lCount)*100).toFixed(0):0)}% | PnL: ${profit.toFixed(2)}`;
        
        document.getElementById('c-idr').innerText = `Rp ${(usdValue * RATES.IDR).toLocaleString('id-ID')}`;
        document.getElementById('c-jpy').innerText = `¥ ${(usdValue * RATES.JPY).toLocaleString('ja-JP')}`;
        document.getElementById('c-aud').innerText = `A$ ${(usdValue * RATES.AUD).toLocaleString('en-AU')}`;
    }

    function mark(k) {
        const v = localStorage.getItem(k);
        if(!v) localStorage.setItem(k, 'W');
        else if(v === 'W') localStorage.setItem(k, 'L');
        else localStorage.removeItem(k);
        render();
    }

    function resetAll() {
        if(confirm("🚨 RESET DATA UNTUK MARKET INI?")) {
            const asset = document.getElementById('asset').value;
            Object.keys(localStorage).forEach(k => { if(k.includes(STORAGE_KEY + asset)) localStorage.removeItem(k); });
            loadAsset();
        }
    }

    window.onload = () => { loadAsset(); setInterval(updateClock, 1000); };
</script>
</body>
</html>
